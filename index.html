<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-screen">
    <div class="login-card">
        <h1 style="margin-bottom: 10px;">Data Academy</h1>
        <p style="color: #64748b; margin-bottom: 30px; font-size: 1.5rem;">Sign in to start your learning path</p>
        <input type="email" id="email" placeholder="Email Address" 
               style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box;">
        <button class="btn btn-primary" style="width: 100%;" onclick="startApp()">Start Learning</button>
    </div>

    <script>
        function startApp() {
            const email = document.getElementById('email').value;
            if (email) {
                // Initial GTM Push
                window.dataLayer = window.dataLayer || [];
                window.dataLayer.push({'event': 'user_login', 'user_email': email});
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
